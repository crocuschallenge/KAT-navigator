<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>APEX NAVIGATOR v3.0 | METRO-TACTICAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --bg-deep-navy: #0B1426;
            --tech-indigo: #1A2A3A;
            --accent-lime: #C6FF00;
            --text-silver: #E0E0E0;
            --sub-text: #607D8B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep-navy);
            font-family: 'Noto Sans KR', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: var(--text-silver);
            position: relative;
        }

        /* === METRO-TACTICAL TOPOGRAPHY (Stylized Cheorwon Hantangang) === */
        .map-container {
            position: absolute;
            inset: 0;
            z-index: -1;
            opacity: 0.15;
            background-image: 
                linear-gradient(var(--tech-indigo) 1px, transparent 1px),
                linear-gradient(90deg, var(--tech-indigo) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .map-line {
            position: absolute;
            stroke: var(--tech-indigo);
            stroke-width: 0.5;
            fill: none;
        }

        /* === HUD OVERLAY ELEMENTS === */
        .hud-frame {
            position: absolute;
            inset: 16px;
            pointer-events: none;
            border-top: 1px solid rgba(198, 255, 0, 0.1);
            border-bottom: 1px solid rgba(198, 255, 0, 0.1);
        }
        .hud-corner {
            position: absolute;
            width: 10px; height: 10px;
            border: 1px solid var(--accent-lime);
        }
        .top-left { top: 0; left: 0; border-right: none; border-bottom: none; }
        .top-right { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bot-left { bottom: 0; left: 0; border-right: none; border-top: none; }
        .bot-right { bottom: 0; right: 0; border-left: none; border-top: none; }

        /* === MAIN CONTENT === */
        .main-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 24px 20px;
            position: relative;
            z-index: 10;
        }

        /* Top Status Bar */
        .top-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--sub-text);
            margin-bottom: 24px;
        }
        .live-indicator {
            width: 6px; height: 6px;
            border-radius: 50%;
            background-color: var(--accent-lime);
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 10px var(--accent-lime);
            animation: pulse 1.5s infinite;
        }

        /* Center Display: GPS Compass & Target */
        .center-display {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        
        .compass-wrap {
            position: relative;
            width: 180px; height: 180px;
        }
        
        .compass-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slowRotate 20s linear infinite;
        }
        
        .needle-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg); /* Simulated bearing to Target */
            width: 130px; height: 130px;
            display: flex; justify-content: center; align-items: flex-start;
        }
        
        .needle {
            width: 2px; height: 65px;
            background: linear-gradient(to bottom, var(--accent-lime), transparent);
            box-shadow: 0 0 10px var(--accent-lime);
        }

        .target-data {
            text-align: center;
        }
        .target-id {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 14px;
            color: var(--accent-lime);
            letter-spacing: 2px;
        }
        .target-dist {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: 900;
            color: white;
            line-height: 1;
            margin: 4px 0;
        }
        .dist-unit { font-size: 14px; font-weight: 500; color: var(--sub-text); }
        .target-name { font-size: 13px; color: var(--text-silver); font-weight: 500; }

        /* Right Activity Panel */
        .activity-panel {
            position: absolute;
            top: 100px; right: 20px;
            display: flex; flex-direction: column; gap: 10px;
            text-align: right;
        }
        .data-point .label { font-size: 9px; color: var(--sub-text); text-transform: uppercase; }
        .data-point .value { font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 700; color: white; }

        /* Bottom Control Panel */
        .bottom-control {
            margin-top: auto;
        }

        /* Dynamic GPS Log Feed - The "Evidence" */
        .gps-log-feed {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            color: var(--tech-indigo);
            height: 40px;
            overflow: hidden;
            margin-bottom: 16px;
            text-align: center;
            mask-image: linear-gradient(to bottom, transparent, white 20%, white 80%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, white 20%, white 80%, transparent);
        }
        .log-list { animation: scrollLogs 15s linear infinite; }
        .log-item { margin-bottom: 3px; }

        /* High-End Tech Button - Z-Gen Style */
        .cta-button {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 60px;
            background-color: rgba(198, 255, 0, 0.05);
            border: 1px solid rgba(198, 255, 0, 0.3);
            border-radius: 4px;
            color: var(--accent-lime);
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .cta-button:active {
            transform: scale(0.98);
            background-color: rgba(198, 255, 0, 0.15);
            border-color: var(--accent-lime);
        }

        .cta-button-highlighter {
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        /* Animations */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes slowRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes scrollLogs { 0% { transform: translateY(0); } 100% { transform: translateY(-300px); } }
        @keyframes shine { 100% { left: 200%; } }

    </style>
</head>
<body>

    <div class="map-container">
        <svg class="map-line" width="400" height="800" viewBox="0 0 400 800">
            <path d="M150,0 Q160,200 80,400 Q0,600 50,800" stroke="#1A2A3A" /> <path d="M300,0 Q320,150 280,300 Q240,450 260,600 Q280,750 250,800" stroke="#1A2A3A" />
            <ellipse cx="200" cy="200" rx="30" ry="20" stroke="#1A2A3A" /> <ellipse cx="100" cy="500" rx="40" ry="25" stroke="#1A2A3A" />
        </svg>
    </div>

    <div class="hud-frame">
        <div class="hud-corner top-left"></div>
        <div class="hud-corner top-right"></div>
        <div class="hud-corner bot-left"></div>
        <div class="hud-corner bot-right"></div>
    </div>

    <div class="main-container">

        <div class="top-status">
            <div>APEX SUMMIT NAVIGATOR v3.0</div>
            <div><span class="live-indicator"></span>LIVE FEED</div>
        }

        <div class="activity-panel">
            <div class="data-point">
                <div class="label">PULSE</div>
                <div class="value">168 <span class="unit">BPM</span></div>
            </div>
            <div class="data-point">
                <div class="label">ALT.</div>
                <div class="value">245 <span class="unit">M</span></div>
            </div>
            <div class="data-point">
                <div class="label">ACTION LVL.</div>
                <div class="value">HIGH</div>
            </div>
        </div>

        <div class="center-display">
            <div class="compass-wrap">
                <div class="compass-ring"></div>
                <div class="needle-box">
                    <div class="needle"></div>
                </div>
            </div>
            
            <div class="target-data">
                <div class="target-id">CHEO-SEC-01</div>
                <div class="target-dist">1.2 <span class="dist-unit">KM</span></div>
                <div class="target-name">철원 오대쌀 식당 '한탄강 가든'</div>
            </div>
        </div>

        <div class="bottom-control">
            
            <div class="gps-log-feed">
                <div class="log-list" id="logList">
                    </div>
            </div>

            <button class="cta-button">
                <div class="cta-button-highlighter"></div>
                🎯 로컬 리워드 잠금 해제
            </button>
        </div>

    </div>

    <script>
        // Generate simulated GPS logs for evidence
        const logList = document.getElementById('logList');
        const count = 50;
        for (let i = 0; i < count; i++) {
            const lat = (38.2 + Math.random() * 0.01).toFixed(6);
            const lon = (127.2 + Math.random() * 0.01).toFixed(6);
            const time = new Date().toLocaleTimeString('en-GB');
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.textContent = `LAT ${lat} LON ${lon} | ${time} - SUPABASE LOGGED`;
            logList.appendChild(logItem);
        }
    </script>

</body>
</html>
