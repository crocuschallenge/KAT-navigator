<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX NAVIGATOR | 2026 CHEORWON</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        :root { --bg-deep-navy: #0B1426; --tech-indigo: #1A2A3A; --accent-lime: #C6FF00; --text-silver: #E0E0E0; --sub-text: #607D8B; --alert-red: #FF3D00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-deep-navy); font-family: 'Noto Sans KR', sans-serif; height: 100dvh; overflow: hidden; color: var(--text-silver); display: flex; flex-direction: column; user-select: none; -webkit-user-select: none; }
        
        #desktop-block { position: fixed; inset: 0; z-index: 9999; background: var(--bg-deep-navy); display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; }
        #qr-img { background: white; padding: 10px; border-radius: 8px; margin: 20px 0; width: 180px; height: 180px; }

        #mobile-content { display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; }
        .map-bg { position: absolute; inset: 0; z-index: 0; opacity: 0.15; background-image: linear-gradient(var(--tech-indigo) 1px, transparent 1px), linear-gradient(90deg, var(--tech-indigo) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
        .hud-frame { position: absolute; inset: 10px; pointer-events: none; z-index: 1; border-top: 1px solid rgba(198, 255, 0, 0.1); border-bottom: 1px solid rgba(198, 255, 0, 0.1); }
        .corner { position: absolute; width: 15px; height: 15px; border: 2px solid var(--accent-lime); }
        .tl { top: 0; left: 0; border-right: none; border-bottom: none; } .tr { top: 0; right: 0; border-left: none; border-bottom: none; } .bl { bottom: 0; left: 0; border-right: none; border-top: none; } .br { bottom: 0; right: 0; border-left: none; border-top: none; }

        .container { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; padding: 20px; justify-content: space-between; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron', monospace; font-size: 11px; margin-bottom: 10px; }
        .live-feed { display: flex; align-items: center; color: var(--accent-lime); font-weight: 700; background: rgba(198,255,0,0.1); padding: 4px 10px; border-radius: 20px; }
        .dot { width: 6px; height: 6px; background-color: var(--accent-lime); border-radius: 50%; margin-right: 6px; animation: blink 1s infinite; }

        .metrics-panel { display: flex; justify-content: space-between; background: rgba(26, 42, 58, 0.6); padding: 12px 15px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 15px; }
        .metric { text-align: center; }
        .metric-label { font-size: 9px; color: var(--sub-text); text-transform: uppercase; font-weight: 700; }
        .metric-val { font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 700; color: #FFF; }
        #point-val { color: var(--accent-lime); text-shadow: 0 0 10px var(--accent-lime); }

        .course-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .course-btn { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: var(--sub-text); padding: 8px 0; border-radius: 4px; font-size: 10px; font-weight: 700; cursor: pointer; }
        .course-btn.active { background: rgba(198, 255, 0, 0.15); border-color: var(--accent-lime); color: var(--accent-lime); }

        .center-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .radar-container { position: relative; width: 220px; height: 220px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; }
        .radar-watermark { position: absolute; width: 110px; opacity: 0.15; z-index: 1; filter: grayscale(1) brightness(1.5); }
        .radar { width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(198, 255, 0, 0.2); position: absolute; transition: transform 0.1s ease-out; z-index: 2; }
        .level-bubble { position: absolute; width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--alert-red); background: rgba(255,61,0,0.3); z-index: 4; }
        .level-bubble.aligned { border-color: var(--accent-lime); background: rgba(198,255,0,0.4); box-shadow: 0 0 15px var(--accent-lime); }
        .target-arrow { position: absolute; top: 10px; left: 50%; width: 4px; height: 100px; background: linear-gradient(to bottom, var(--accent-lime), transparent); transform-origin: bottom center; z-index: 5; transition: transform 0.3s ease-out; }

        .target-info { text-align: center; }
        .target-dist { font-family: 'Orbitron', monospace; font-size: 52px; font-weight: 900; color: #FFF; line-height: 1; margin-bottom: 5px; }
        .target-desc { font-size: 13px; color: var(--text-silver); background: rgba(0,0,0,0.4); padding: 6px 12px; border-radius: 4px; }

        .cta-btn { width: 100%; padding: 20px 0; background: rgba(198, 255, 0, 0.08); border: 1px solid var(--accent-lime); color: var(--accent-lime); font-weight: 700; font-size: 17px; border-radius: 4px; cursor: pointer; }
        #sensor-overlay { position: absolute; inset: 0; background: var(--bg-deep-navy); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }
        .start-btn { margin-top: 25px; padding: 18px 40px; background: rgba(198,255,0,0.1); border: 1px solid var(--accent-lime); color: var(--accent-lime); font-family: 'Orbitron', monospace; border-radius: 4px; cursor: pointer;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="desktop-block">
        <div style="font-family:'Orbitron'; font-size:24px;">APEX PATHFINDER</div>
        <img id="qr-img" src="" alt="QR">
        <div style="color:var(--sub-text);">스마트폰으로 스캔하여 작전을 시작하십시오.</div>
    </div>
    <div id="mobile-content">
        <div class="map-bg"></div>
        <div class="hud-frame"><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div></div>
        <div id="sensor-overlay">
            <div style="font-family:'Orbitron'; font-size:24px; font-weight:900;">APEX PATHFINDER</div>
            <div style="font-size:12px; margin:15px 0; color:var(--sub-text);">[2026 CHEORWON DEMO]<br>오프라인 데이터 복원 엔진 가동 중</div>
            <button class="start-btn" onclick="initSystem()">SYSTEM START</button>
        </div>
        <div class="container">
            <div>
                <div class="top-bar">
                    <div>APEX NAVIGATOR v3.5</div>
                    <div class="live-feed"><div class="dot"></div>LIVE: <span id="live-count"> 200 </span></div>
                </div>
                <div class="metrics-panel">
                    <div class="metric"><div class="metric-label">POINT</div><div class="metric-val" id="point-val">0</div></div>
                    <div class="metric"><div class="metric-label">LEVELER</div><div class="metric-val" id="level-status" style="color:var(--alert-red);">TILT</div></div>
                    <div class="metric"><div class="metric-label">GPS ACC.</div><div class="metric-val" id="gps-acc">WAIT</div></div>
                </div>
                <div class="course-selector">
                    <div class="course-btn active" onclick="selectCourse(0, this)">전통시장</div>
                    <div class="course-btn" onclick="selectCourse(1, this)">철원노포</div>
                    <div class="course-btn" onclick="selectCourse(2, this)">철원9경</div>
                </div>
            </div>
            <div class="center-display">
                <div class="radar-container">
                    <img src="https://www.cwg.go.kr/site/tour2024/images/common/logo_on.png" class="radar-watermark">
                    <div class="radar" id="compass-ring"></div>
                    <div id="level-bubble" class="level-bubble"></div>
                    <div class="target-arrow" id="target-arrow"></div>
                </div>
                <div class="target-info">
                    <div style="font-family:'Orbitron'; color:var(--accent-lime); font-size:12px; letter-spacing:2px;" id="target-code">TARGET: MARKET-SYNC</div>
                    <div class="target-dist" id="dist-val">-- <span>M</span></div>
                    <div class="target-desc" id="target-desc">동송전통시장 거점 데이터 대기 중</div>
                </div>
            </div>
            <button class="cta-btn" onclick="claimPoint()">🎯 미션 인증 & 포인트 적립</button>
        </div>
    </div>
    <script>
        // --- 1. PC 접속 방어막 ---
        if (!/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            document.getElementById('mobile-content').style.display = 'none';
            document.getElementById('desktop-block').style.display = 'flex';
            document.getElementById('qr-img').src = "https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=" + encodeURIComponent(window.location.href);
        }

        // --- 2. IndexedDB 오프라인 엔진 세팅 ---
        let db, currentHeading = 0, isSystemStarted = false, baseCount = 200, currentPoints = 0, demoTargetLat, demoTargetLon, initialLat, initialLon;
        const request = indexedDB.open("ApexTrailCache", 1);
        request.onupgradeneeded = (e) => { e.target.result.createObjectStore("location_logs", { keyPath: "id", autoIncrement: true }); };
        request.onsuccess = (e) => { db = e.target.result; };

        const courses = [
            { code: "TARGET: MARKET-SYNC", desc: "동송전통시장 (이평로 48번길)", dist: 30 },
            { code: "TARGET: NOPO-RECOVER", desc: "철원막국수 (갈말읍 명성로)", dist: 2500 },
            { code: "TARGET: VIEW-POINT", desc: "고석정 (동송읍 태봉로)", dist: 8500 }
        ];

        // --- 3. 데이터 복원(Sync) 로직 ---
        async function syncData() {
            if (!supabaseClient || !navigator.onLine || !db) return;
            const tx = db.transaction("location_logs", "readwrite"), store = tx.objectStore("location_logs");
            store.getAll().onsuccess = async (e) => {
                const logs = e.target.result; if (logs.length === 0) return;
                const { error } = await supabaseClient.from('trail_participants').insert(logs.map(l => ({ session_id: 'RECOVERED_'+l.timestamp, page: '2026-cheorwon-action' })));
                if (!error) { const delTx = db.transaction("location_logs", "readwrite"); delTx.objectStore("location_logs").clear(); console.log("[SYNC] 복원 완료"); }
            };
        }

        function selectCourse(idx, btn) {
            document.querySelectorAll('.course-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            document.getElementById('target-code').innerText = courses[idx].code; document.getElementById('target-desc').innerText = courses[idx].desc;
            if(initialLat) { demoTargetLat = initialLat + (courses[idx].dist / 111000); demoTargetLon = initialLon; }
        }

        function claimPoint() {
            currentPoints += 500; document.getElementById('point-val').innerText = currentPoints.toLocaleString();
            alert(`[미션 성공]\n포인트 적립 완료!\n\n* IndexedDB 엔진을 통해 오프라인 상태에서도 포인트 데이터가 안전하게 보호됩니다.`);
        }

        // --- 4. 시스템 가동 ---
        const SUPABASE_URL = 'https://rmbicpzmisajoysrtljg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_GU7bw082s_SIAYy1HprF2g_yPwQhILa';
        let supabaseClient = null;

        async function initSystem() {
            if(isSystemStarted) return; isSystemStarted = true;
            document.getElementById('sensor-overlay').style.display = 'none';
            try { supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); syncData(); } catch(e) {}
            startSensors();
            setInterval(() => { if(Math.random() > 0.6) { baseCount++; document.getElementById('live-count').innerText = baseCount; } }, 3000);
            window.addEventListener('focus', syncData); // 화면 켰을 때 복원 실행
        }

        function startSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => { if(state === 'granted') window.addEventListener('deviceorientation', handleOrient); });
            } else { window.addEventListener('deviceorientation', handleOrient); }
            navigator.geolocation.watchPosition(updatePos, null, { enableHighAccuracy: true });
        }

        function handleOrient(e) {
            currentHeading = e.webkitCompassHeading || Math.abs(e.alpha - 360);
            document.getElementById('compass-ring').style.transform = `rotate(${-currentHeading}deg)`;
            const b = document.getElementById('level-bubble'), s = document.getElementById('level-status');
            let x = Math.max(-45, Math.min(45, e.gamma * 2)), y = Math.max(-45, Math.min(45, e.beta * 2));
            b.style.transform = `translate(${x}px, ${y}px)`;
            if(Math.abs(e.beta) < 3 && Math.abs(e.gamma) < 3) { b.classList.add('aligned'); s.innerText = "ALIGNED"; s.style.color = "var(--accent-lime)"; if(navigator.vibrate) navigator.vibrate(50); }
            else { b.classList.remove('aligned'); s.innerText = "TILT"; s.style.color = "var(--alert-red)"; }
        }

        function updatePos(p) {
            const lat = p.coords.latitude, lon = p.coords.longitude;
            if(!initialLat) { initialLat = lat; initialLon = lon; selectCourse(0, document.querySelector('.course-btn')); }
            document.getElementById('gps-acc').innerText = Math.floor(p.coords.accuracy) + "M";
            if(db) { const tx = db.transaction("location_logs", "readwrite"); tx.objectStore("location_logs").add({ lat, lon, timestamp: new Date().toISOString() }); }
            const d = calcDist(lat, lon, demoTargetLat, demoTargetLon);
            document.getElementById('dist-val').innerHTML = d < 1 ? Math.floor(d*1000) + " <span>M</span>" : d.toFixed(2) + " <span>KM</span>";
            const b = calcBearing(lat, lon, demoTargetLat, demoTargetLon);
            document.getElementById('target-arrow').style.transform = `translateX(-50%) rotate(${b - currentHeading}deg)`;
        }

        function calcDist(l1, o1, l2, o2) { const R = 6371, dL = (l2-l1)*Math.PI/180, dO = (o2-o1)*Math.PI/180; const a = Math.sin(dL/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dO/2)**2; return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
        function calcBearing(l1, o1, l2, o2) { const dO = (o2-o1)*Math.PI/180; const y = Math.sin(dO)*Math.cos(l2*Math.PI/180), x = Math.cos(l1*Math.PI/180)*Math.sin(l2*Math.PI/180) - Math.sin(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.cos(dO); return (Math.atan2(y, x)*180/Math.PI + 360)%360; }
    </script>
</body>
</html>
