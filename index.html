<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX TACTICAL NAVIGATOR</title>
<style>
    body { margin: 0; padding: 0; background-color: #ffffff; font-family: 'Noto Sans KR', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .apex-tactical-wrapper { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
    
    .apex-title { color: #004d40; font-size: 26px; font-weight: 900; margin-bottom: 5px; letter-spacing: -1px; }
    .apex-subtitle { color: #666; font-size: 14px; margin-bottom: 30px; font-weight: 700; }

    /* 나침반 본체 (요청하신 디자인 100% 반영) */
    .tactical-bezel { 
        width: 300px; height: 300px; margin: 0 auto 30px; border-radius: 50%; 
        border: 12px solid #4eb5c1; /* 시안 블루 테두리 */
        background: radial-gradient(circle, #385a64 0%, #20353d 100%); /* 다크 틸 메탈릭 다이얼 */
        position: relative; 
        box-shadow: 0 15px 30px rgba(0,0,0,0.3), inset 0 0 40px rgba(0,0,0,0.8); 
        transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* 유리 빛 반사 효과 (Glass Highlights) */
    .glass-glare-1 { position: absolute; top: 12%; left: 15%; width: 70px; height: 70px; background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 60%); border-radius: 50%; z-index: 4; pointer-events: none; }
    .glass-glare-2 { position: absolute; top: 8%; left: 45%; width: 50px; height: 50px; background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 60%); border-radius: 50%; z-index: 4; pointer-events: none; }
    .glass-glare-3 { position: absolute; bottom: 15%; left: 45%; width: 80px; height: 80px; background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 60%); border-radius: 50%; z-index: 4; pointer-events: none; }

    /* 방위각 텍스트 및 나침반 선 */
    .crosshair-v { position: absolute; top: 5%; left: 50%; width: 1px; height: 90%; background: rgba(255,255,255,0.15); transform: translateX(-50%); }
    .crosshair-h { position: absolute; top: 50%; left: 5%; width: 90%; height: 1px; background: rgba(255,255,255,0.15); transform: translateY(-50%); }
    
    .mark { position: absolute; color: rgba(255,255,255,0.8); font-weight: 300; font-size: 20px; font-family: 'Times New Roman', serif; letter-spacing: 2px; }
    .mark-n { top: 10px; left: 50%; transform: translateX(-50%); font-size: 28px; font-weight: normal; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
    .mark-s { bottom: 10px; left: 50%; transform: translateX(-50%); }
    .mark-e { top: 50%; right: 15px; transform: translateY(-50%); }
    .mark-w { top: 50%; left: 15px; transform: translateY(-50%); }

    /* 날카로운 특수부대 바늘 (Red & Blue) */
    .tactical-needle { 
        position: absolute; top: 50%; left: 50%; 
        width: 24px; height: 230px; 
        background: linear-gradient(to bottom, #d50000 50%, #0047b3 50%); 
        clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); /* 완벽한 다이아몬드 컷팅 */
        transform: translate(-50%, -50%); z-index: 5; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.6);
    }

    /* 바늘 중앙 입체선 */
    .needle-line { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: rgba(255,255,255,0.5); z-index: 6; transform: translateX(-50%); }

    /* 중앙 실버 핀 */
    .center-pin { 
        position: absolute; top: 50%; left: 50%; width: 26px; height: 26px; 
        background: radial-gradient(circle, #e0e0e0 0%, #888888 100%); 
        border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; 
        box-shadow: 0 4px 8px rgba(0,0,0,0.5); border: 2px solid #555;
        display: flex; justify-content: center; align-items: center;
    }
    .center-pin::after { content: '+'; color: #444; font-size: 16px; font-weight: bold; }

    /* 텔레메트리 HUD 박스 */
    .hud-box { background: #f8f9fa; border-left: 5px solid #004d40; padding: 20px; border-radius: 10px; text-align: left; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .hud-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .hud-label { color: #004d40; font-weight: 800; font-size: 15px; }
    .hud-value { color: #111; font-weight: 900; font-size: 18px; }

    /* 가동 버튼 */
    .tactical-btn { 
        width: 100%; padding: 18px; background-color: #004d40; color: #ffffff; 
        font-size: 18px; font-weight: 900; border: none; border-radius: 8px; 
        cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,77,64,0.3);
    }
</style>
</head>
<body>

<div class="apex-tactical-wrapper">
    <h2 class="apex-title">APEX NAVIGATOR</h2>
    <p class="apex-subtitle">TACTICAL GPS TRACKING</p>

    <div class="tactical-bezel" id="compass-bezel">
        <div class="glass-glare-1"></div>
        <div class="glass-glare-2"></div>
        <div class="glass-glare-3"></div>
        <div class="crosshair-v"></div>
        <div class="crosshair-h"></div>
        <span class="mark mark-n">N</span>
        <span class="mark mark-e">E</span>
        <span class="mark mark-s">S</span>
        <span class="mark mark-w">W</span>
        
        <div class="tactical-needle">
            <div class="needle-line"></div>
        </div>
        <div class="center-pin"></div>
    </div>

    <div class="hud-box">
        <div class="hud-row">
            <span class="hud-label">목표까지 실거리</span>
            <span class="hud-value" id="target-distance">대기 중...</span>
        </div>
        <div class="hud-row" style="margin-bottom: 0;">
            <span class="hud-label" style="color:#666; font-size:13px;">현재 고도 (GPS)</span>
            <span class="hud-value" id="current-altitude" style="font-size:14px; color:#555;">측정 중...</span>
        </div>
    </div>

    <button class="tactical-btn" id="activate-compass-btn">시스템 동기화 가동</button>
</div>

<script>
    const bezel = document.getElementById('compass-bezel');
    const btnActivate = document.getElementById('activate-compass-btn');
    const elDistance = document.getElementById('target-distance');
    const elAltitude = document.getElementById('current-altitude');

    // APEX SUMMIT 목표 좌표 (예시)
    const TARGET_LAT = 37.5665; 
    const TARGET_LON = 126.9780; 

    function calculateRealDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; const rad = Math.PI/180;
        const dLat = (lat2-lat1) * rad; const dLon = (lon2-lon1) * rad;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
    }

    btnActivate.addEventListener('click', () => {
        btnActivate.style.backgroundColor = '#39FF14';
        btnActivate.style.color = '#004d40';
        btnActivate.innerText = 'GPS 통신 연결됨';

        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(state => {
                    if (state === 'granted') startTracking();
                    else alert('센서 권한이 거부되었습니다.');
                }).catch(err => alert('권한 요청 에러가 발생했습니다.'));
        } else {
            startTracking();
        }
    });

    function startTracking() {
        window.addEventListener('deviceorientation', (e) => {
            let currentHeading = e.webkitCompassHeading || Math.abs(e.alpha - 360);
            bezel.style.transform = `rotate(${-currentHeading}deg)`;
        }, true);

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const alt = pos.coords.altitude;

                elAltitude.innerText = alt ? `${alt.toFixed(1)} m` : '고도 측정 불가';
                const dist = calculateRealDistance(lat, lon, TARGET_LAT, TARGET_LON);
                elDistance.innerText = dist > 1000 ? `${(dist/1000).toFixed(2)} km` : `${Math.round(dist)} m`;
                
            }, (err) => {
                elDistance.innerText = 'GPS 수신 거부됨';
            }, { enableHighAccuracy: true, maximumAge: 0 });
        }
    }
</script>
</body>
</html>
