<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>APEX TACTICAL NAVIGATOR</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0; padding: 0; background-color: #050a05;
        background-image: radial-gradient(circle at center, #0a140a 0%, #000000 100%);
        color: #4ade80; font-family: 'Chakra Petch', sans-serif;
        display: flex; flex-direction: column; align-items: center;
        min-height: 100vh; overflow-x: hidden;
    }

    .header { text-align: center; margin-top: 15px; margin-bottom: 15px; }
    .title { font-family: 'Black Ops One', cursive; font-size: 26px; margin: 0; text-transform: uppercase; color: #ffffff; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    .subtitle { font-size: 11px; letter-spacing: 1.5px; color: #4ade80; opacity: 0.9; margin-top: 5px; font-weight: 700; white-space: nowrap; }

    .main-container {
        width: 90%; max-width: 420px; background: #0a0f0a; border: 3px solid #1a2f1a; border-radius: 12px;
        padding: 20px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 5px rgba(255,255,255,0.1); position: relative;
    }

    .heading-display {
        position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
        background: #0a0f0a; padding: 5px 20px; border: 2px solid #1a2f1a; border-radius: 5px;
        font-family: 'Black Ops One', cursive; font-size: 24px; color: #ffffff;
        text-shadow: 0 0 10px rgba(74, 222, 128, 0.3); display: flex; align-items: baseline; justify-content: center; z-index: 20;
    }
    .heading-unit { font-size: 12px; margin-left: 8px; color: #4ade80; }

    /* 나침반 크기 약간 축소하여 리스트 공간 확보 */
    .compass-ui {
        position: relative; width: 220px; height: 220px; margin: 20px auto 20px;
        border-radius: 50%; border: 10px solid #142014;
        box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 5px 20px rgba(0,0,0,0.8), inset 0 0 0 2px rgba(74, 222, 128, 0.3);
        background: radial-gradient(circle, #0a140a 30%, #050a05 90%); display: flex; justify-content: center; align-items: center;
    }
    .compass-face { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .dial-mark { position: absolute; font-weight: 700; font-size: 16px; color: #3a5f3a; }
    .mark-n { top: 10px; left: 50%; transform: translateX(-50%); color: #d32f2f; font-size: 20px; text-shadow: 0 0 10px rgba(211, 47, 47, 0.4); }
    .mark-s { bottom: 10px; left: 50%; transform: translateX(-50%); color: #ffffff; }
    .mark-e { right: 10px; top: 50%; transform: translateY(-50%); color: #ffffff; }
    .mark-w { left: 10px; top: 50%; transform: translateY(-50%); color: #ffffff; }
    
    .tick { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; transform: translateX(-50%); }
    .tick::before, .tick::after { content: ''; position: absolute; width: 2px; height: 8px; background: #2a402a; }
    .tick::before { top: 5px; } .tick::after { bottom: 5px; }
    .t-30 { transform: translateX(-50%) rotate(30deg); } .t-60 { transform: translateX(-50%) rotate(60deg); }
    .t-120 { transform: translateX(-50%) rotate(120deg); } .t-150 { transform: translateX(-50%) rotate(150deg); }
    .t-210 { transform: translateX(-50%) rotate(210deg); } .t-240 { transform: translateX(-50%) rotate(240deg); }
    .t-300 { transform: translateX(-50%) rotate(300deg); } .t-330 { transform: translateX(-50%) rotate(330deg); }

    .needle-container {
        position: absolute; top: 50%; left: 50%; width: 16px; height: 190px;
        transform-origin: center center; transform: translate(-50%, -50%) rotate(0deg); 
        z-index: 10; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5));
    }
    .needle-body {
        width: 100%; height: 100%; clip-path: polygon(50% 0, 85% 50%, 50% 100%, 15% 50%);
        background: linear-gradient(to bottom, #d32f2f 0%, #b71c1c 50%, #0d47a1 50%, #1565c0 100%);
    }
    .center-pin {
        position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; background: radial-gradient(circle at 30% 30%, #b0bec5, #37474f);
        border: 2px solid #263238; border-radius: 50%; transform: translate(-50%, -50%); z-index: 11; box-shadow: 0 2px 5px rgba(0,0,0,0.8);
    }

    /* 컴팩트한 상단 데이터 바 */
    .compact-data {
        display: flex; justify-content: space-between; background: #0f140f; border: 1px solid #1a2f1a; border-radius: 6px; padding: 10px 15px; margin-bottom: 15px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    }
    .data-item { display: flex; flex-direction: column; align-items: center; }
    .data-label { font-size: 11px; color: #80a080; margin-bottom: 3px; font-weight: 700; letter-spacing: 1px;}
    .data-value { font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 16px; color: #ffffff; }

    /* [신규] 미션 체크포인트 관제 패널 */
    .mission-panel {
        background: #0f140f; border: 1px solid #1a2f1a; border-radius: 6px; padding: 12px; margin-bottom: 20px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    }
    .panel-title { font-size: 12px; font-weight: 700; margin-bottom: 10px; border-bottom: 1px solid #1a2f1a; padding-bottom: 5px; color: #80a080; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between;}
    
    .cp-list { list-style: none; padding: 0; margin: 0; }
    .cp-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #1a2f1a; font-size: 13px; }
    .cp-item:last-child { border-bottom: none; }
    
    .cp-name { color: #aaaaaa; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    /* 상태 표시등 (🔴대기, 🟡추적중, 🟢통과) */
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background-color: #555; box-shadow: 0 0 5px #000; }
    .status-dot.active { background-color: #fbc02d; box-shadow: 0 0 10px #fbc02d; animation: blink 1s infinite; }
    .status-dot.cleared { background-color: #39FF14; box-shadow: 0 0 10px #39FF14; }
    
    .cp-status-text { font-family: 'Black Ops One', cursive; font-size: 12px; letter-spacing: 1px; }
    .text-cleared { color: #39FF14; }
    .text-active { color: #fbc02d; }
    .text-pending { color: #555; }

    @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }

    .tactical-btn {
        width: 100%; padding: 16px; background: linear-gradient(180deg, #2e4e2e, #1a2f1a);
        border: 2px solid #142014; border-bottom: 4px solid #0a0f0a; border-radius: 6px;
        color: #ffffff; font-family: 'Black Ops One', cursive; font-size: 18px; letter-spacing: 2px;
        cursor: pointer; transition: all 0.1s; text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    .tactical-btn:active { transform: translateY(3px); border-bottom: 1px solid #0a0f0a; }
    .tactical-btn.active { background: linear-gradient(180deg, #d32f2f, #b71c1c); color: #ffffff; border-color: #8e0000; }
    .tactical-btn.completed { background: linear-gradient(180deg, #004d40, #00251a); color: #39FF14; border-color: #39FF14; }

    .footer { margin-top: 15px; font-size: 10px; color: #4a6b4a; letter-spacing: 2px; text-align: center; }
    .reset-link { color: #3a5f3a; text-decoration: underline; cursor: pointer; margin-top: 5px; display: inline-block; }
</style>
</head>
<body>

<div class="header">
    <h1 class="title">APEX NAVIGATOR</h1>
    <p class="subtitle">TACTICAL CP TRACKING SYSTEM</p>
</div>

<div class="main-container">
    <div class="heading-display">
        <span id="heading-value">---</span><span class="heading-unit">°DEG</span>
    </div>

    <div class="compass-ui">
        <div class="compass-face">
            <span class="dial-mark mark-n">N</span><span class="dial-mark mark-e">E</span>
            <span class="dial-mark mark-s">S</span><span class="dial-mark mark-w">W</span>
            <div class="tick t-30"></div><div class="tick t-60"></div><div class="tick t-120"></div><div class="tick t-150"></div>
            <div class="tick t-210"></div><div class="tick t-240"></div><div class="tick t-300"></div><div class="tick t-330"></div>
        </div>
        <div class="needle-container" id="compass-needle">
            <div class="needle-body"></div>
        </div>
        <div class="center-pin"></div>
    </div>

    <div class="compact-data">
        <div class="data-item"><span class="data-label">TARGET DIST</span><span class="data-value" id="dist-to-target">대기 중...</span></div>
        <div class="data-item" style="border-left: 1px solid #1a2f1a; border-right: 1px solid #1a2f1a; padding: 0 15px;"><span class="data-label">TOTAL DIST</span><span class="data-value" id="dist-total">0 m</span></div>
        <div class="data-item"><span class="data-label">ALTITUDE</span><span class="data-value" id="alt-current">N/A</span></div>
    </div>

    <div class="mission-panel">
        <div class="panel-title"><span>MISSION WAYPOINTS</span> <span id="mission-status">STANDBY</span></div>
        <ul class="cp-list" id="cp-list-container">
            </ul>
    </div>

    <button class="tactical-btn" id="activate-btn">SYSTEM ENGAGE (가동)</button>
</div>

<div class="footer">
    © 2026 APEX SUMMIT. ALL RIGHTS RESERVED.<br>
    <span class="reset-link" onclick="resetMission()">초기화 (테스트용)</span>
</div>

<script>
    // --- [핵심] APEX SUMMIT 코스 체크포인트 배열 세팅 ---
    // 현장 테스트를 위해 대표님이 계신 곳 주변이나 실제 CP 좌표를 입력하세요.
    const WAYPOINTS = [
        { id: 1, name: "START (출발지)", lat: 37.5512, lon: 126.9882 }, // 예: 남산
        { id: 2, name: "CP 1 (제1보급소)", lat: 37.5665, lon: 126.9780 }, // 예: 시청
        { id: 3, name: "CP 2 (정상 통과)", lat: 37.5796, lon: 126.9770 }, // 예: 경복궁
        { id: 4, name: "DESTINATION (완주)", lat: 37.5826, lon: 126.9830 } // 예: 북촌
    ];
    
    const RADIUS_METER = 50; // 통과 인정 반경 (50미터 이내 진입 시 자동 통과)

    const btnActivate = document.getElementById('activate-btn');
    const needle = document.getElementById('compass-needle'); 
    const headingVal = document.getElementById('heading-value');
    const elDistTarget = document.getElementById('dist-to-target');
    const elDistTotal = document.getElementById('dist-total');
    const elAltCurrent = document.getElementById('alt-current');
    const cpListContainer = document.getElementById('cp-list-container');
    const missionStatus = document.getElementById('mission-status');

    let isTracking = false;
    let lastPos = null;
    let totalDistance = 0;
    
    // 블랙박스 메모리: 브라우저에 저장된 통과 기록 불러오기
    let currentCpIndex = parseInt(localStorage.getItem('apex_cp_index')) || 0;

    // CP 리스트 UI 렌더링 함수
    function renderCPList() {
        cpListContainer.innerHTML = '';
        WAYPOINTS.forEach((wp, index) => {
            let statusClass = 'text-pending';
            let dotClass = '';
            let statusText = 'PENDING';

            if (index < currentCpIndex) {
                statusClass = 'text-cleared';
                dotClass = 'cleared';
                statusText = 'PASSED';
            } else if (index === currentCpIndex) {
                statusClass = 'text-active';
                dotClass = 'active';
                statusText = 'TRACKING..';
            }

            const li = document.createElement('li');
            li.className = 'cp-item';
            li.innerHTML = `
                <div class="cp-name">
                    <div class="status-dot ${dotClass}"></div>
                    ${wp.name}
                </div>
                <div class="cp-status-text ${statusClass}">${statusText}</div>
            `;
            cpListContainer.appendChild(li);
        });

        if (currentCpIndex >= WAYPOINTS.length) {
            missionStatus.innerText = "ALL CLEARED";
            missionStatus.style.color = "#39FF14";
            btnActivate.innerText = "MISSION ACCOMPLISHED";
            btnActivate.classList.add('completed');
            elDistTarget.innerText = "완주 완료";
        } else {
            missionStatus.innerText = `TARGET: CP ${currentCpIndex + 1}`;
            missionStatus.style.color = "#fbc02d";
        }
    }

    // 거리 계산 함수
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; const rad = Math.PI / 180;
        const dLat = (lat2 - lat1) * rad; const dLon = (lon2 - lon1) * rad;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }
    
    function formatDistance(meters) {
        if (meters >= 1000) return (meters / 1000).toFixed(2) + ' km';
        return Math.round(meters) + ' m';
    }

    // 초기 화면 렌더링
    renderCPList();

    // 시스템 가동
    btnActivate.addEventListener('click', () => {
        if (isTracking || currentCpIndex >= WAYPOINTS.length) return;
        btnActivate.innerText = 'SYSTEM ACTIVE (작동 중)';
        btnActivate.classList.add('active');
        isTracking = true;

        const handleCompass = (e) => {
            let heading = null;
            if (e.webkitCompassHeading !== undefined) {
                heading = e.webkitCompassHeading;
            } else if (e.absolute === true || e.alpha !== null) {
                heading = 360 - e.alpha;
            }

            if (heading !== null) {
                heading = heading % 360;
                headingVal.innerText = Math.round(heading).toString().padStart(3, '0');
                needle.style.transform = `translate(-50%, -50%) rotate(${-heading}deg)`;
            }
        };

        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(state => { if (state === 'granted') window.addEventListener('deviceorientation', handleCompass, true); }).catch(console.error);
        } else {
            window.addEventListener('deviceorientationabsolute', handleCompass, true);
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(updatePosition, (err) => console.warn('GPS Error'), {
                enableHighAccuracy: true, maximumAge: 0, timeout: 10000
            });
        }
    });

    // 위치 추적 및 지오펜싱(자동 통과) 로직
    function updatePosition(pos) {
        if (currentCpIndex >= WAYPOINTS.length) return; // 이미 다 통과했으면 계산 중지

        const lat = pos.coords.latitude; const lon = pos.coords.longitude; const alt = pos.coords.altitude;
        
        // 현재 추적 중인 타겟 CP
        const targetWP = WAYPOINTS[currentCpIndex];
        const distToTarget = calculateDistance(lat, lon, targetWP.lat, targetWP.lon);
        
        elDistTarget.innerText = formatDistance(distToTarget);
        if (alt !== null) elAltCurrent.innerText = Math.round(alt) + ' m';

        // 총 누적 거리 계산
        if (!lastPos) { lastPos = { lat, lon }; }
        const distStep = calculateDistance(lastPos.lat, lastPos.lon, lat, lon);
        if (distStep > 1) { totalDistance += distStep; lastPos = { lat, lon }; }
        elDistTotal.innerText = formatDistance(totalDistance);

        // [핵심] 지오펜싱: 타겟 반경 50m 이내 진입 시 자동 통과 처리
        if (distToTarget <= RADIUS_METER) {
            // 스마트폰 진동 울림 (햅틱 피드백)
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 500]);
            
            alert(`[통과 인증] ${targetWP.name}에 도착했습니다! 다음 목표로 타겟을 변경합니다.`);
            
            // 다음 CP로 인덱스 증가 및 영구 저장
            currentCpIndex++;
            localStorage.setItem('apex_cp_index', currentCpIndex);
            
            // UI 업데이트
            renderCPList();
        }
    }

    // 테스트용 초기화 함수 (맨 아래 텍스트 클릭 시)
    function resetMission() {
        if(confirm("모든 통과 기록을 삭제하고 처음부터 다시 시작하시겠습니까?")) {
            localStorage.removeItem('apex_cp_index');
            currentCpIndex = 0;
            totalDistance = 0;
            lastPos = null;
            renderCPList();
            alert("초기화 완료. 다시 가동 버튼을 눌러주세요.");
            location.reload();
        }
    }
</script>
</body>
</html>
